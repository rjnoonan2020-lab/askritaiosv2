<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RITA Coach — Signing In</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main class="wrap" style="max-width:440px;">
    <header class="header">
      <h1>RITA Coach</h1>
      <p class="sub">Signing you in…</p>
    </header>
    <section class="card" style="text-align:center;">
      <div class="mini" id="msg">Please wait while we complete your sign in.</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rita-coach.supabase.co";
    const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqdWJpYmprYXNvYXR0bWJxdXJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODAyMDEsImV4cCI6MjA4ODA1NjIwMX0.djzKshGnvgxqmD6PiKP5tnW0gjgKdqHyQcA_MHTCqqs;
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        window.location.href = "/coach.html";
      } else {
        document.getElementById("msg").textContent = "Something went wrong. Please try again.";
        setTimeout(() => window.location.href = "/login.html", 3000);
      }
    });
  </script>
</body>
</html>
