<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RITA Coach</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>

<body>
  <main class="wrap">
    <header class="header">
      <h1>RITA Coach</h1>
      <p class="sub">A gentle accountability partner for your next chapter.</p>
    </header>

    <section class="card">
      <div class="coachShell">

        <!-- LEFT: Coaching conversation -->
        <div class="coachLeft">
          <div class="noticeBox">
            <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;">
              <input id="consent" type="checkbox" style="margin-top:3px;">
              <span class="mini">
                I understand RITA provides educational guidance for the non-financial side of retirement and is not financial, legal, or tax advice.
              </span>
            </label>

            <div class="mini" style="margin-top:10px;">
              <a href="/privacy.html">Privacy</a> |
              <a href="/terms.html">Terms</a> |
              <a href="/support.html">Support</a> |
              <a href="/delete.html">Delete my data</a>
            </div>
          </div>

          <div id="chat" class="chat"></div>

          <div class="inputDock">
            <textarea id="msg" class="textarea" rows="3" placeholder="Type your reply…"></textarea>
            <button id="send" class="btn" disabled>Send</button>
            <button id="reset" class="btn secondary" type="button">Reset</button>
          </div>

          <div class="row">
            <span id="status" class="status"></span>
          </div>
        </div>

        <!-- RIGHT: Weekly Momentum -->
        <div class="coachRight">
          <h2 class="h2">Weekly Momentum</h2>
          <div class="mini">RITA suggests 1 to 3 commitments. You can edit them.</div>

          <div id="commitments" class="commitList"></div>

          <div class="row">
            <button id="checkin" class="btn secondary" type="button">Run Weekly Check-In</button>
            <button id="newWeek" class="btn secondary" type="button">Keep or Reset</button>
          </div>
        </div>

      </div>
    </section>

    <footer class="footer">
      <small>© Third Act Advisors • Ask-RITA.ai</small>
    </footer>
  </main>

  <script>
    // Embed mode for GoDaddy iframe
    if (window.self !== window.top) document.body.classList.add("embed");
  </script>

  <script src="/assets/coach.js"></script>
</body>
</html>
