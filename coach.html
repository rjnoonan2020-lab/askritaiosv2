<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RITA Coach</title>
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    .chat { display:flex; flex-direction:column; gap:10px; }
    .bubble{
      max-width: 900px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .rita{ background: rgba(220,20,60,.10); }
    .you { background: rgba(9,12,18,.55); align-self:flex-end; }
    .row2{ display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-top:10px;}
    .grow{ flex: 1 1 520px; }
    .mini{ font-size:14px; color: var(--muted); }
    .commit{ display:flex; gap:10px; align-items:flex-start; padding:10px; border:1px solid rgba(255,255,255,.12); border-radius:12px; margin-top:10px;}
    select{ background: rgba(9,12,18,.65); color: var(--text); border:1px solid var(--border); border-radius:10px; padding:8px; }
    input[type="text"]{ width:100%; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>RITA Coach</h1>
      <p class="sub">A gentle accountability partner for your next chapter.</p>
    </header>

    <section class="card">
      <div style="margin-bottom:12px;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;">
        <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;">
          <input id="consent" type="checkbox" style="margin-top:3px;">
          <span style="color:#a9b4c7;line-height:1.35;">
            I understand RITA provides educational guidance for the non-financial side of retirement and is not financial, legal, or tax advice.
          </span>
        </label>

        <div style="margin-top:10px;color:#a9b4c7;font-size:14px;">
          <a href="/privacy.html">Privacy</a> |
          <a href="/terms.html">Terms</a> |
          <a href="/support.html">Support</a> |
          <a href="/delete.html">Delete my data</a>
        </div>
      </div>

      <div id="chat" class="chat"></div>

      <div class="row2">
        <textarea id="msg" class="textarea grow" rows="3" placeholder="Type your reply…"></textarea>
        <button id="send" class="btn" disabled>Send</button>
        <button id="reset" class="btn secondary" type="button">Reset</button>
        <span id="status" class="status"></span>
      </div>

      <div style="margin-top:12px;">
        <h2 class="h2">Weekly Momentum</h2>
        <div class="mini">RITA will suggest 1–3 commitments when it is time. You can edit them.</div>
        <div id="commitments"></div>

        <div class="row" style="margin-top:10px;">
          <button id="checkin" class="btn secondary" type="button">Run Weekly Check-In</button>
          <button id="newWeek" class="btn secondary" type="button">Keep or Reset</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <small>© Third Act Advisors • Ask-RITA.ai</small>
    </footer>
  </main>

  <script src="/assets/coach.js"></script>
</body>
</html>
