<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RITA Coach</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="coach-container">

    <div class="top-bar">
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>

    <div class="rita-header">
      <img src="/assets/rita-avatar.jpg" alt="RITA" class="rita-avatar" />
      <p class="rita-name">RITA</p>
      <p class="rita-tagline">Your retirement coaching companion</p>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="chat">Coaching</button>
      <button class="nav-tab" data-tab="momentum">Weekly Momentum</button>
    </div>

    <div class="tab-panel active" id="tab-chat">
      <div class="notice-bar">
        <input type="checkbox" id="consent" />
        <span>I understand RITA provides educational guidance for the non-financial side of retirement — not financial, legal, or tax advice. <a href="/privacy.html">Privacy</a> | <a href="/terms.html">Terms</a></span>
      </div>
      <div class="chat" id="chat"></div>
      <div class="status-bar" id="status"></div>
      <div class="input-dock">
        <textarea id="msg" rows="2" placeholder="Type your message…"></textarea>
        <button class="send-btn" id="send" disabled>
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div style="margin-top:12px;text-align:right;">
        <button class="btn secondary" id="reset" type="button" style="font-size:13px;padding:7px 14px;">Reset session</button>
      </div>
    </div>

    <div class="tab-panel" id="tab-momentum">
      <div id="commitmentsList"></div>
      <div class="checkin-area">
        <button class="btn" id="checkin" type="button">Run Weekly Check-In</button>
        <button class="btn secondary" id="newWeek" type="button">Keep or Reset Commitments</button>
      </div>
    </div>

  </div>

  <script src="/assets/supabase.min.js"></script>
  <script src="/assets/coach.js"></script>
</body>
</html>
