<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RITA Coach</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="coach-container">

    <div class="top-bar">
      <button class="signout-btn" id="signOutBtn">Sign out</button>
    </div>

    <div class="rita-header">
      <img src="/assets/rita-avatar.jpg" alt="RITA" class="rita-avatar" />
      <p class="rita-name">RITA</p>
      <p class="rita-tagline">Your retirement coaching companion</p>
    </div>

    <!-- FOCUS PICKER -->
    <div id="focusPicker">
      <p class="focus-prompt">What would you like to focus on today?</p>
      <div class="focus-grid">
        
        <button class="focus-card" data-area="Activity" data-emoji="🏃">
          <span class="focus-emoji">🏃</span>
          <span class="focus-label">Activity</span>
          <span class="focus-sub">Are you active enough?</span>
        </button>
        <button class="focus-card" data-area="Emotions" data-emoji="💛">
          <span class="focus-emoji">💛</span>
          <span class="focus-label">Emotions</span>
          <span class="focus-sub">How are you really feeling?</span>
        </button>
        <button class="focus-card" data-area="Connections" data-emoji="👥">
          <span class="focus-emoji">👥</span>
          <span class="focus-label">Connections</span>
          <span class="focus-sub">Where do family and friends fit?</span>
        </button>
        <button class="focus-card" data-area="Meaning" data-emoji="🎯">
          <span class="focus-emoji">🎯</span>
          <span class="focus-label">Meaning</span>
          <span class="focus-sub">Have you found your path yet?</span>
        </button>
        <button class="focus-card" data-area="Leisure" data-emoji="🎨">
          <span class="focus-emoji">🎨</span>
          <span class="focus-label">Leisure</span>
          <span class="focus-sub">What do you do with your time?</span>
        </button>
        <button class="focus-card" data-area="Learning" data-emoji="📚">
          <span class="focus-emoji">📚</span>
          <span class="focus-label">Learning</span>
          <span class="focus-sub">Are you keeping mentally fit?</span>
        </button>
        <button class="focus-card" data-area="Contribution" data-emoji="🤝">
          <span class="focus-emoji">🤝</span>
          <span class="focus-label">Contribution</span>
          <span class="focus-sub">What do you do to give back?</span>
        </button>
        <button class="focus-card" data-area="Time" data-emoji="⏰">
          <span class="focus-emoji">⏰</span>
          <span class="focus-label">Time</span>
          <span class="focus-sub">How do you manage your days?</span>
        </button>
        <button class="focus-card" data-area="Finance & Home" data-emoji="🏠">
          <span class="focus-emoji">🏠</span>
          <span class="focus-label">Finance & Home</span>
          <span class="focus-sub">Your relationship with money and home.</span>
        </button>
      </div>
    </div>

    <!-- COACHING INTERFACE -->
    <div id="coachInterface" style="display:none;">
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="chat">My Weekly Session</button>
        <button class="nav-tab" data-tab="momentum">My Next Steps</button>
      </div>

      <div class="tab-panel active" id="tab-chat">
        <div class="focus-badge" id="focusBadge"></div>
        <div class="chat" id="chat"></div>
        <div class="status-bar" id="status"></div>
        <div class="input-dock">
          <textarea id="msg" rows="2" placeholder="Type your message…"></textarea>
          <button class="send-btn" id="send">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="notice-bar" style="margin-top:12px;margin-bottom:0;">
          <span>RITA provides educational guidance for the non-financial side of retirement — not financial, legal, or tax advice. By using RITA Coach you agree to our <a href="https://ask-rita.ai/legal" target="_blank">Terms & Conditions</a> and <a href="/privacy.html" target="_blank">Privacy Policy</a>.</span>
        </div>
        <div style="margin-top:12px;display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn secondary" id="reset" type="button" style="font-size:13px;padding:7px 14px;">Reset session</button>
        </div>
        <div class="focus-switch" id="focusSwitch"></div>
        </div>
      </div>

      <div class="tab-panel" id="tab-momentum">
        <div id="commitmentsList"></div>
        <div class="checkin-area">
          <button class="btn" id="checkin" type="button">How did I do this week?</button>
<button class="btn secondary" id="newWeek" type="button">Start fresh for next week</button>
        </div>
      </div>
    </div>

  </div>

  <script src="/assets/supabase.min.js"></script>
  <script src="/assets/coach.js"></script>
</body>
</html>
