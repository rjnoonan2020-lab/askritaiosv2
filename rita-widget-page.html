
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask RITA</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Lato', Arial, sans-serif;
      background: #fff;
      overflow: hidden;
    }
    .widget {
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-radius: 20px;
      overflow: hidden;
    }
    .header {
      background: #c8392b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      object-fit: cover;
    }
    .header-title {
      color: white;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }
    .header-subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 10px;
      letter-spacing: 0.3px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-fullchat {
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 3px 8px;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .btn-fullchat:hover { background: rgba(255,255,255,0.2); }
    .btn-close {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.8;
      line-height: 1;
      padding: 2px 4px;
    }
    .btn-close:hover { opacity: 1; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fdf8f3;
    }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.6;
    }
    .bubble.rita {
      background: #f9ecea;
      color: #2c2c2c;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.you {
      background: #c8392b;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.typing {
      background: #f9ecea;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
    }
    .dots { display: flex; gap: 4px; align-items: center; }
    .dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #c8392b;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .input-area {
      border-top: 1px solid #e8e0d8;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: white;
      flex-shrink: 0;
    }
    .input {
      flex: 1;
      border: 1px solid #e8e0d8;
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 13px;
      font-family: 'Lato', Arial, sans-serif;
      resize: none;
      outline: none;
      background: #fdf8f3;
      max-height: 80px;
      min-height: 36px;
      line-height: 1.4;
    }
    .input:focus { border-color: #c8392b; }
    .send {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #c8392b;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .send:hover { background: #a02d22; }
    .send:disabled { background: #ccc; cursor: not-allowed; }
    .send svg { width: 15px; height: 15px; fill: white; }
    .disclaimer {
      font-size: 10px;
      color: #aaa;
      text-align: center;
      padding: 4px 12px 6px;
      background: white;
    }
  </style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="header-left">
      <img class="header-avatar" src="/assets/rita-avatar.jpg" alt="RITA" onerror="this.style.display='none'" />
      <div>
        <div class="header-title">Ask RITA</div>
        <div class="header-subtitle">Retirement Interest & Thought Agent™</div>
      </div>
    </div>
    <div class="header-actions">
      <a class="btn-fullchat" href="/rita-free.html" target="_blank">Full chat</a>
      <button class="btn-close" id="closeBtn">×</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="bubble rita">Hi! I'm RITA — your retirement companion. What's on your mind today?</div>
  </div>

  <div class="input-area">
    <textarea class="input" id="msg" placeholder="Ask me anything…" rows="1"></textarea>
    <button class="send" id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="disclaimer">General info only — not financial, medical or legal advice.</div>
</div>

<script>
  var messagesEl = document.getElementById("messages");
  var msgEl = document.getElementById("msg");
  var sendBtn = document.getElementById("sendBtn");
  var closeBtn = document.getElementById("closeBtn");
  var messages = [];
  var busy = false;

  closeBtn.addEventListener("click", function() {
    window.parent.postMessage("rita-close", "*");
  });

  function addBubble(text, who) {
    var div = document.createElement("div");
    div.className = "bubble " + who;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    var div = document.createElement("div");
    div.className = "bubble typing";
    div.id = "typing";
    div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function send() {
    if (busy) return;
    var text = (msgEl.value || "").trim();
    if (!text) return;
    msgEl.value = "";
    msgEl.style.height = "auto";
    addBubble(text, "you");
    messages.push({ role: "user", content: text });
    busy = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      var resp = await fetch("/.netlify/functions/rita-free", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: messages.slice(-10) })
      });
      var data = await resp.json();
      removeTyping();
      var reply = data.reply || "I'm here to help! Tell me more.";
      addBubble(reply, "rita");
      messages.push({ role: "assistant", content: reply });
    } catch(e) {
      removeTyping();
      addBubble("Something went wrong — please try again!", "rita");
    } finally {
      busy = false;
      sendBtn.disabled = false;
      msgEl.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  msgEl.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  msgEl.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 80) + "px";
  });
</script>
</body>
</html>
